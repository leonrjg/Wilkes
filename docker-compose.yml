services:
  wilkes:
    build: .
    container_name: wilkes
    ports:
      - "2000:2000"
    volumes:
      - wilkes-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  wilkes-data:
