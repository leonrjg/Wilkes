name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            extra_args: --config tauri.macos.conf.json
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            extra_args: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            extra_args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache Rust registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-build-

      - name: Cache ORT download
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ort
            ~/Library/Caches/ort
            ${{ env.LOCALAPPDATA }}\ort
          key: ${{ runner.os }}-ort-${{ hashFiles('Cargo.lock') }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ui/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config clang libclang-dev \
            libssl-dev libfontconfig-dev libglib2.0-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci --prefix ui

      - name: Build
        if: runner.os != 'Windows'
        working-directory: crates/desktop
        run: ../../ui/node_modules/.bin/tauri build --target ${{ matrix.target }} ${{ matrix.extra_args }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: crates/desktop
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          CFLAGS: /MD
          CXXFLAGS: /MD
        run: |
          if ($env:CERTIFICATE_BASE64) {
            $bytes = [Convert]::FromBase64String($env:CERTIFICATE_BASE64)
            $pfxPath = Join-Path $env:TEMP certificate.pfx
            [IO.File]::WriteAllBytes($pfxPath, $bytes)
            Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My `
              -Password (ConvertTo-SecureString $env:CERTIFICATE_PASSWORD -AsPlainText -Force)
            Remove-Item $pfxPath
            $configJson = '{"bundle":{"windows":{"certificateThumbprint":"' + $env:THUMBPRINT + '","timestampUrl":"http://timestamp.digicert.com"}}}'
            ../../ui/node_modules/.bin/tauri build --target ${{ matrix.target }} --config $configJson
          } else {
            ../../ui/node_modules/.bin/tauri build --target ${{ matrix.target }}
          }

      - name: Create portable Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseDir = "target/${{ matrix.target }}/release"
          $bundleDir = Join-Path $releaseDir "bundle/portable"
          $portableRoot = Join-Path $bundleDir "Wilkes"
          $zipPath = Join-Path $bundleDir "Wilkes_${{ matrix.target }}_portable.zip"

          if (Test-Path $portableRoot) {
            Remove-Item $portableRoot -Recurse -Force
          }
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          New-Item -ItemType Directory -Path $portableRoot | Out-Null

          Copy-Item (Join-Path $releaseDir "wilkes-desktop.exe") (Join-Path $portableRoot "Wilkes.exe")
          Copy-Item (Join-Path $releaseDir "wilkes-rust-worker.exe") (Join-Path $portableRoot "wilkes-rust-worker.exe")
          Copy-Item "crates/worker/requirements.txt" (Join-Path $portableRoot "requirements.txt")
          Copy-Item "crates/worker/wilkes_python_worker" (Join-Path $portableRoot "wilkes_python_worker") -Recurse

          $webViewLoader = Join-Path $releaseDir "WebView2Loader.dll"
          if (Test-Path $webViewLoader) {
            Copy-Item $webViewLoader (Join-Path $portableRoot "WebView2Loader.dll")
          }

          Compress-Archive -Path (Join-Path $portableRoot "*") -DestinationPath $zipPath

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: wilkes-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: wilkes-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: wilkes-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/portable/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
